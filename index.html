<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四色圓盤訓練大師 - 專業版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
        }
        .color-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        /* 隱藏時，連同內部的文字也要消失 */
        .hidden-color {
            background-color: #e2e8f0 !important;
            transform: scale(0.9);
            box-shadow: none !important;
        }
        .hidden-color span {
            opacity: 0 !important;
        }
        
        .color-red { background-color: #ef4444; box-shadow: 0 4px 0 #b91c1c; }
        .color-blue { background-color: #3b82f6; box-shadow: 0 4px 0 #1d4ed8; }
        .color-yellow { background-color: #eab308; box-shadow: 0 4px 0 #a16207; }
        .color-green { background-color: #22c55e; box-shadow: 0 4px 0 #15803d; }
        
        @keyframes pulse-slow {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .active-task {
            animation: pulse-slow 2s infinite;
        }

        /* 碼錶字體 */
        .timer-font {
            font-family: 'Courier New', Courier, monospace;
        }

        /* 平滑摺疊動畫 */
        #settingsPanel {
            max-height: 1000px;
            overflow: hidden;
            transition: max-height 0.5s ease-in-out, opacity 0.3s ease;
        }
        #settingsPanel.collapsed {
            max-height: 0;
            opacity: 0;
            padding: 0;
            margin-bottom: 0;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <!-- 標題區 -->
    <header class="text-center mb-4">
        <h1 class="text-3xl font-bold text-slate-800">🎨 四色圓盤訓練大師</h1>
    </header>

    <!-- 設定面板控制 -->
    <div class="w-full max-w-5xl mb-4 flex justify-end">
        <button id="toggleSettingsBtn" class="flex items-center gap-2 text-slate-500 hover:text-blue-600 font-bold text-sm bg-white px-4 py-2 rounded-xl shadow-sm border border-slate-100 transition-all">
            <span id="toggleIcon">🔼</span> <span id="toggleText">收起設定</span>
        </button>
    </div>

    <!-- 設定面板 -->
    <div id="settingsPanel" class="w-full max-w-5xl bg-white rounded-2xl shadow-xl p-6 mb-6 border border-slate-100">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-6 gap-4">
            <!-- 模式選擇 -->
            <div>
                <label class="block text-sm font-bold text-slate-600 mb-1">訓練模式</label>
                <select id="gameMode" class="w-full border-2 border-slate-100 rounded-xl p-2 focus:ring-2 focus:ring-blue-400 outline-none transition-all cursor-pointer">
                    <option value="sequence">顏色序列 (隨機排列)</option>
                    <option value="flash">閃視記憶 (時間到隱藏)</option>
                    <option value="stroop">文字陷阱 (依文字判斷)</option>
                    <option value="coordination">手腳並用 (肢體指令)</option>
                    <option value="collection">隨機指令 (數量+顏色)</option>
                </select>
            </div>
            
            <!-- 人數模式 -->
            <div>
                <label class="block text-sm font-bold text-slate-600 mb-1">玩家模式</label>
                <select id="playerMode" class="w-full border-2 border-slate-100 rounded-xl p-2 focus:ring-2 focus:ring-blue-400 outline-none transition-all cursor-pointer">
                    <option value="single">單人訓練</option>
                    <option value="double">雙人對抗 (A/B組)</option>
                </select>
            </div>

            <!-- 圖形形狀 -->
            <div>
                <label class="block text-sm font-bold text-slate-600 mb-1">圖形形狀</label>
                <select id="shapeMode" class="w-full border-2 border-slate-100 rounded-xl p-2 focus:ring-2 focus:ring-blue-400 outline-none transition-all cursor-pointer">
                    <option value="circle">經典圓形</option>
                    <option value="square">穩定正方形</option>
                    <option value="rectangle">清晰長方形(直)</option>
                </select>
            </div>

            <!-- 項目數量 -->
            <div id="itemCountWrapper">
                <label class="block text-sm font-bold text-slate-600 mb-1">項目數量 (1-4)</label>
                <input type="number" id="itemCount" min="1" max="4" value="4" class="w-full border-2 border-slate-100 rounded-xl p-2 focus:ring-2 focus:ring-blue-400 outline-none transition-all">
            </div>

            <!-- 時間設定 -->
            <div>
                <label class="block text-sm font-bold text-slate-600 mb-1">計時設定 (秒)</label>
                <input type="number" id="timerSeconds" min="0" value="0" class="w-full border-2 border-slate-100 rounded-xl p-2 focus:ring-2 focus:ring-blue-400 outline-none transition-all" placeholder="0為手動">
            </div>

            <!-- 控制 -->
            <div class="flex items-end">
                <button id="startBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-xl shadow-lg transition-all active:scale-95">
                    開始訓練
                </button>
            </div>
        </div>
    </div>

    <!-- 主展示區 -->
    <main class="w-full max-w-6xl flex-grow flex flex-col">
        
        <!-- 資訊欄：題數、碼錶、計時條 -->
        <div class="mb-4">
            <div id="infoDisplay" class="flex justify-center items-center gap-4 mb-2 hidden">
                <!-- 題數 -->
                <span class="bg-slate-800 text-white px-4 py-1 rounded-lg text-sm font-bold shadow-sm">
                    第 <span id="currentQuestionNum">1</span> 題
                </span>
                <!-- 碼錶 (僅分:秒) -->
                <span class="bg-blue-50 text-blue-700 border border-blue-200 px-4 py-1 rounded-lg text-sm font-bold shadow-sm flex items-center gap-2">
                    ⏱️ <span id="stopwatchDisplay" class="timer-font">00:00</span>
                </span>
            </div>
            <!-- 倒數計時條 -->
            <div id="progressContainer" class="w-full h-3 bg-slate-100 rounded-full overflow-hidden hidden border border-slate-200">
                <div id="progressBar" class="h-full bg-gradient-to-r from-blue-400 to-indigo-500 w-0 transition-all duration-100 linear"></div>
            </div>
        </div>

        <!-- 雙人/單人顯示容器 -->
        <div id="mainDisplayContainer" class="flex flex-col md:flex-row gap-8 w-full flex-grow items-stretch">
            
            <!-- A 組 / 單人區 -->
            <div id="areaA" class="flex-1 bg-white rounded-3xl p-6 shadow-sm border-2 border-dashed border-slate-200 flex flex-col items-center justify-center min-h-[350px]">
                <h2 id="labelA" class="text-slate-400 font-bold mb-4 hidden">PLAYER A</h2>
                <div id="contentA" class="flex flex-wrap justify-center gap-4 w-full">
                    <div class="text-slate-300 italic text-lg text-center">準備就緒，點擊「開始」</div>
                </div>
            </div>

            <!-- B 組區 (預設隱藏) -->
            <div id="areaB" class="flex-1 bg-white rounded-3xl p-6 shadow-sm border-2 border-dashed border-slate-200 flex flex-col items-center justify-center min-h-[350px] hidden">
                <h2 class="text-slate-400 font-bold mb-4">PLAYER B</h2>
                <div id="contentB" class="flex flex-wrap justify-center gap-4 w-full"></div>
            </div>

        </div>

        <!-- 下方控制按鈕 -->
        <div class="mt-8 flex flex-wrap justify-center gap-4">
            <button id="nextBtn" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-10 rounded-full shadow-lg transform active:scale-95 transition-all hidden">
                下一題 (NEXT)
            </button>
            <button id="revealBtn" class="bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 px-10 rounded-full shadow-lg transform active:scale-95 transition-all hidden">
                顯示答案 (REVEAL)
            </button>
            <button id="resetBtn" class="bg-slate-200 hover:bg-slate-300 text-slate-600 font-bold py-3 px-10 rounded-full shadow-lg transform active:scale-95 transition-all">
                結束重設
            </button>
        </div>
    </main>

    <!-- 頁尾設計資訊 -->
    <footer class="mt-12 mb-8 text-center text-slate-500 text-sm">
        <p>設計：
            <a href="https://www.facebook.com/mpotkevin" target="_blank" class="text-blue-600 hover:underline font-bold transition-colors">
                職能治療師 - 鄭凱文
            </a>
        </p>
    </footer>

    <script>
        const colors = [
            { id: 'red', name: '紅', class: 'color-red' },
            { id: 'blue', name: '藍', class: 'color-blue' },
            { id: 'yellow', name: '黃', class: 'color-yellow' },
            { id: 'green', name: '綠', class: 'color-green' }
        ];

        const limbs = ['左手', '右手', '左腳', '右腳'];

        // 計時器相關變數
        let countdownTimerId = null;
        let countdownIntervalId = null;
        let stopwatchIntervalId = null;
        let startTime = 0;
        let questionCount = 0;

        const areaA = document.getElementById('areaA');
        const areaB = document.getElementById('areaB');
        const contentA = document.getElementById('contentA');
        const contentB = document.getElementById('contentB');
        const labelA = document.getElementById('labelA');
        
        const gameMode = document.getElementById('gameMode');
        const playerMode = document.getElementById('playerMode');
        const shapeMode = document.getElementById('shapeMode');
        const timerSeconds = document.getElementById('timerSeconds');
        const itemCountInput = document.getElementById('itemCount');
        
        const startBtn = document.getElementById('startBtn');
        const nextBtn = document.getElementById('nextBtn');
        const revealBtn = document.getElementById('revealBtn');
        const resetBtn = document.getElementById('resetBtn');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const infoDisplay = document.getElementById('infoDisplay');
        const currentQuestionNum = document.getElementById('currentQuestionNum');
        const stopwatchDisplay = document.getElementById('stopwatchDisplay');
        const settingsPanel = document.getElementById('settingsPanel');
        const toggleSettingsBtn = document.getElementById('toggleSettingsBtn');
        const toggleIcon = document.getElementById('toggleIcon');
        const toggleText = document.getElementById('toggleText');

        function shuffle(array) {
            return [...array].sort(() => Math.random() - 0.5);
        }

        function distributeSum(total, buckets) {
            let result = Array(buckets).fill(1);
            let remaining = total - buckets;
            while (remaining > 0) {
                let idx = Math.floor(Math.random() * buckets);
                if (result[idx] < 4) {
                    result[idx]++;
                    remaining--;
                } else {
                    if (result.every(v => v >= 4)) break;
                }
            }
            return result;
        }

        // 停止所有計時
        function stopAllTimers() {
            if (countdownTimerId) clearTimeout(countdownTimerId);
            if (countdownIntervalId) clearInterval(countdownIntervalId);
            if (stopwatchIntervalId) clearInterval(stopwatchIntervalId);
            progressBar.style.width = '0%';
            progressContainer.classList.add('hidden');
        }

        // 啟動碼錶
        function startStopwatch() {
            if (stopwatchIntervalId) clearInterval(stopwatchIntervalId);
            startTime = Date.now();
            stopwatchIntervalId = setInterval(updateStopwatch, 500); 
            updateStopwatch(); 
        }

        function updateStopwatch() {
            const now = Date.now();
            const diff = now - startTime;
            const sec = Math.floor((diff / 1000) % 60);
            const min = Math.floor(diff / 60000);
            
            stopwatchDisplay.innerText = 
                `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        function createTaskElement(color, isHidden = false, customLabel = null) {
            const el = document.createElement('div');
            const shape = shapeMode.value;
            
            // 基礎樣式
            let shapeClasses = "color-card flex items-center justify-center text-white font-bold border-4 border-white ";
            
            // 根據形狀設定尺寸與圓角 - 此處長短邊已互換
            if (shape === 'circle') {
                shapeClasses += "w-20 h-20 sm:w-28 sm:h-28 rounded-full";
            } else if (shape === 'square') {
                shapeClasses += "w-20 h-20 sm:w-28 sm:h-28 rounded-2xl";
            } else if (shape === 'rectangle') {
                // 調整為直向長方形：寬縮小、高增加
                shapeClasses += "w-20 h-28 sm:w-28 sm:h-40 rounded-2xl";
            }

            el.className = `${shapeClasses} ${color.class} ${isHidden ? 'hidden-color' : ''}`;
            
            const label = customLabel || color.name;
            const fontSizeClass = label.length > 2 ? 'text-xl sm:text-2xl' : 'text-3xl sm:text-4xl';
            
            // 針對 Stroop 模式或特定底色調整字體顏色對比
            const textColorClass = (color.id === 'yellow') ? 'text-slate-800' : 'text-white';
            
            el.innerHTML = `<span class="opacity-90 select-none transition-opacity duration-300 ${fontSizeClass} ${textColorClass} text-center px-1">${label}</span>`;
            el.dataset.colorId = color.id;
            return el;
        }

        function createCollectionTask(count, distributionList) {
            const shuffled = shuffle(colors).slice(0, count); 
            const container = document.createElement('div');
            container.className = 'flex flex-col gap-4 w-full';
            
            shuffled.forEach((color, index) => {
                const num = distributionList[index];
                const item = document.createElement('div');
                item.className = 'flex items-center gap-4 bg-slate-50 p-4 rounded-2xl border-l-8 active-task';
                item.style.borderLeftColor = getHex(color.id);
                item.innerHTML = `
                    <div class="w-10 h-10 rounded-full ${color.class}"></div>
                    <div class="text-xl font-bold text-slate-700 leading-tight">拿 <span class="text-3xl text-blue-600">${num}</span> 個${color.name}色</div>
                `;
                container.appendChild(item);
            });
            return container;
        }

        function getHex(id) {
            const map = { red: '#ef4444', blue: '#3b82f6', yellow: '#eab308', green: '#22c55e' };
            return map[id];
        }

        function generateTask() {
            stopAllTimers();
            
            // 更新題數與碼錶
            questionCount++;
            currentQuestionNum.innerText = questionCount;
            infoDisplay.classList.remove('hidden');
            startStopwatch();

            const mode = gameMode.value;
            const pMode = playerMode.value;
            const seconds = parseInt(timerSeconds.value);
            const countValue = Math.min(Math.max(parseInt(itemCountInput.value), 1), 4);

            contentA.innerHTML = '';
            contentB.innerHTML = '';
            revealBtn.classList.add('hidden');

            const isDouble = pMode === 'double';

            if (mode === 'sequence' || mode === 'flash' || mode === 'coordination' || mode === 'stroop') {
                const buildDisplay = (container) => {
                    const sequence = shuffle(colors).slice(0, countValue);
                    sequence.forEach(colorObj => {
                        let label = null;
                        let bgColorObj = colorObj;

                        if (mode === 'coordination') {
                            label = limbs[Math.floor(Math.random() * limbs.length)];
                        } else if (mode === 'stroop') {
                            label = colorObj.name;
                            bgColorObj = colors[Math.floor(Math.random() * colors.length)];
                        }
                        
                        container.appendChild(createTaskElement(bgColorObj, false, label));
                    });
                };

                buildDisplay(contentA);
                if (isDouble) buildDisplay(contentB);

            } else if (mode === 'collection') {
                const totalQuantity = Math.floor(Math.random() * (countValue * 1.5)) + countValue; 
                const distA = distributeSum(totalQuantity, countValue);
                contentA.appendChild(createCollectionTask(countValue, distA));

                if (isDouble) {
                    const distB = distributeSum(totalQuantity, countValue);
                    contentB.appendChild(createCollectionTask(countValue, distB));
                }
            }

            // 處理定時與閃視隱藏邏輯
            if (mode === 'flash') {
                handleCountdown(seconds, () => {
                    document.querySelectorAll('.color-card').forEach(card => card.classList.add('hidden-color'));
                    revealBtn.classList.remove('hidden');
                });
            } else if (seconds > 0) {
                handleCountdown(seconds, generateTask);
            }
        }

        // 處理進度條倒數
        function handleCountdown(seconds, callback) {
            if (seconds <= 0) return;
            progressContainer.classList.remove('hidden');
            let timeLeft = seconds * 1000;
            const interval = 100;
            
            countdownIntervalId = setInterval(() => {
                timeLeft -= interval;
                const percentage = ((seconds * 1000 - timeLeft) / (seconds * 1000)) * 100;
                progressBar.style.width = `${percentage}%`;
                if (timeLeft <= 0) {
                    clearInterval(countdownIntervalId);
                    callback();
                }
            }, interval);
        }

        // 收納設定面板邏輯
        toggleSettingsBtn.addEventListener('click', () => {
            const isCollapsed = settingsPanel.classList.toggle('collapsed');
            toggleIcon.innerText = isCollapsed ? '🔽' : '🔼';
            toggleText.innerText = isCollapsed ? '展開設定' : '收起設定';
        });

        playerMode.addEventListener('change', () => {
            if (playerMode.value === 'double') {
                areaB.classList.remove('hidden');
                labelA.classList.remove('hidden');
            } else {
                areaB.classList.add('hidden');
                labelA.classList.add('hidden');
            }
        });

        startBtn.addEventListener('click', () => {
            startBtn.classList.add('hidden');
            nextBtn.classList.remove('hidden');
            // 開始訓練後自動收起設定面板，讓畫面更清爽
            settingsPanel.classList.add('collapsed');
            toggleIcon.innerText = '🔽';
            toggleText.innerText = '展開設定';
            generateTask();
        });

        nextBtn.addEventListener('click', generateTask);
        
        revealBtn.addEventListener('click', () => {
            document.querySelectorAll('.color-card').forEach(card => card.classList.remove('hidden-color'));
            revealBtn.classList.add('hidden');
        });

        resetBtn.addEventListener('click', () => {
            stopAllTimers();
            questionCount = 0;
            infoDisplay.classList.add('hidden');
            stopwatchDisplay.innerText = "00:00";
            contentA.innerHTML = '<div class="text-slate-300 italic text-lg text-center">準備就緒，點擊「開始」</div>';
            contentB.innerHTML = '';
            startBtn.classList.remove('hidden');
            nextBtn.classList.add('hidden');
            revealBtn.classList.add('hidden');
            // 重置時展開設定
            settingsPanel.classList.remove('collapsed');
            toggleIcon.innerText = '🔼';
            toggleText.innerText = '收起設定';
        });
    </script>
</body>
</html>
